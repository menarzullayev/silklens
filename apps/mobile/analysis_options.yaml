include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Generated files use part-of and avoid_dynamic; relax for them.
    invalid_annotation_target: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated_plugin_registrant.dart"
    - "build/**"
    - "lib/l10n/generated/**"

linter:
  rules:
    # Reinforce / override very_good_analysis defaults for this codebase.
    public_member_api_docs: false   # Re-enable in FAZA 2 once API surface stabilizes.
    avoid_print: true
    prefer_relative_imports: false  # Absolute imports per package: are preferred for Clean Arch boundaries.
    always_use_package_imports: true
    sort_pub_dependencies: false
    # Match dart format --line-length=100 (backend ruff uses 100 too).
    lines_longer_than_80_chars: false
    # Style noise — explicit redundancy is sometimes clearer than implicit defaults.
    avoid_redundant_argument_values: false
    # Cascades are an aesthetic choice; calling .add twice is fine.
    cascade_invocations: false
