# Configuration for `flutter gen-l10n`. The generator runs automatically as
# part of `flutter pub get` because `generate: true` is set in pubspec.yaml.

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
output-dir: lib/l10n
synthetic-package: false
nullable-getter: false
