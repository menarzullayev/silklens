# =============================================================================
# SilkLens — Security scans
# -----------------------------------------------------------------------------
# Runs on every pull request (including Dependabot's) and on a weekly cron.
# The cron deliberately uses an off-peak minute (Monday 07:17 UTC) to dodge
# GitHub's top-of-the-hour load and reduce false-negative timeouts.
#
# Jobs:
#   * trivy-fs   — filesystem scan: vulnerable deps + leaked secrets.
#   * bandit     — Python security linter against services/api/src.
#                  HIGH severity ⇒ build failure; MEDIUM ⇒ warning.
#   * codeql     — CodeQL for Python + JavaScript/TypeScript.
#                  (Dart/Flutter is intentionally skipped — CodeQL doesn't
#                   support it as of 2026.)
#
# Dependabot PRs are first-class citizens here: we deliberately don't gate on
# `github.actor`. Trivy and Bandit run against the diffed code as-is.
# =============================================================================

name: Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Mondays at 07:17 UTC — off-peak; cron in UTC per crontab semantics.
    - cron: "17 7 * * 1"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Defaults: read-only. CodeQL widens to `security-events: write` for SARIF.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Trivy filesystem scan: catches vulnerable deps + secret leaks.
  # Uploads SARIF to the Security tab so findings have history.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy — filesystem (vulns + secrets)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      # SARIF upload needs `security-events: write`.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Trivy's secret scanner inspects history when available; depth 1 is
          # cheaper and matches what the runner has anyway after a normal PR.
          fetch-depth: 1

      - name: Install Trivy via official script
        # Avoids action-version resolution failures. The script always installs
        # the latest stable Trivy release from GitHub releases.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy filesystem scan
        # HIGH+ findings fail the build; SARIF written for the Security tab.
        run: |
          trivy fs . \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            --format sarif \
            --output trivy-results.sarif \
            --timeout 10m
        continue-on-error: false

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Bandit: Python-specific lint for common security antipatterns.
  # ---------------------------------------------------------------------------
  bandit:
    name: Bandit — Python security lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install Bandit
        # Bandit is already declared as a dev dep in pyproject.toml; install
        # just bandit + sarif formatter to avoid pulling the full stack.
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif,toml]>=1.7.0"

      - name: Bandit — fail on HIGH severity
        # `-lll` = report severity LOW+, `-iii` = report confidence LOW+;
        # combined with `--severity-level high` only HIGH+ failures exit 1.
        run: |
          bandit \
            -r src \
            --severity-level high \
            --confidence-level medium \
            -f sarif \
            -o bandit-high.sarif

      - name: Bandit — warn on MEDIUM severity (non-blocking)
        # Same scan with a relaxed severity gate; emits warnings to the
        # job summary but does not fail the build.
        if: always()
        continue-on-error: true
        run: |
          set +e
          bandit \
            -r src \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            -o bandit-medium.txt
          rc=$?
          {
            echo "### Bandit — MEDIUM findings (advisory)"
            echo ""
            echo '```'
            cat bandit-medium.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Don't propagate failure for MEDIUM; the HIGH job above is the gate.
          exit 0

      - name: Upload Bandit SARIF (HIGH)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: services/api/bandit-high.sarif
          category: bandit-high

  # ---------------------------------------------------------------------------
  # CodeQL — Python + JavaScript/TypeScript.
  # Dart is unsupported by CodeQL; mobile relies on `flutter analyze` in ci.yml
  # plus the static-analysis tooling shipped with Dart itself.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      # `actions: read` is required by CodeQL when scanning private repos.
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Single source of truth: add languages here, not in three places.
        language: ["python", "javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds high-signal queries beyond the defaults
          # (e.g. SSRF, command injection variants) without overwhelming noise.
          queries: security-extended

      - name: Autobuild
        # Python + JS/TS need no compile step; Autobuild is a no-op that
        # satisfies CodeQL's expected pipeline shape.
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Trivy container-image scan: OS-level CVEs + package CVEs inside the image.
  # Complements trivy-fs (which scans the source tree) by catching vulns in
  # system packages (libpq5, curl, openssl, …) that have no pip representation.
  # Skipped on pull_request events — trivy-fs already gates PRs and image
  # builds add 3-5 min to PR feedback loops.
  # ---------------------------------------------------------------------------
  trivy-image:
    name: Trivy — container image (OS + pkg CVEs)
    runs-on: ubuntu-24.04
    # Only run on push to main and the weekly schedule — not on every PR.
    if: github.event_name != 'pull_request'
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Build API image
        # Build for the local platform only — this is a security scan, not a
        # release artefact, so we don't need multi-arch here.
        # No --no-cache so GHA's implicit layer cache is used; the scan result
        # is the same since we always get the latest resolved packages.
        run: |
          docker build \
            --tag silklens-api:ci \
            --file services/api/Dockerfile \
            services/api/

      - name: Scan image with Trivy
        # HIGH+ with --ignore-unfixed: only actionable CVEs (a fix exists) fail
        # the build.  OS-level and package-level vulns both covered.
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,misconfig \
            --format sarif \
            --output trivy-image.sarif \
            --timeout 15m \
            silklens-api:ci

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Post image scan summary
        if: always()
        run: |
          {
            echo "### Trivy image scan — \`silklens-api\`"
            echo ""
            trivy image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --scanners vuln,misconfig \
              --format table \
              silklens-api:ci 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # SBOM: generate CycloneDX SBOMs for the API and admin surfaces and upload
  # them as workflow artefacts (90-day retention).
  #
  # Two SBOMs are produced:
  #   sbom-api.cdx.json   — Python deps parsed from services/api/pyproject.toml
  #   sbom-admin.cdx.json — Node deps parsed from apps/admin/package.json
  #
  # Note: the release pipeline also attaches an image-level SBOM to the OCI
  # manifest via `buildx --sbom=true` (SPDX format).  The two complement each
  # other: this job provides source-time visibility; the release job captures
  # exactly-installed versions baked into the published image.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM — CycloneDX (API + admin)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Generate API SBOM (CycloneDX JSON)
        run: |
          trivy fs services/api \
            --format cyclonedx \
            --output sbom-api.cdx.json \
            --scanners vuln \
            --quiet

      - name: Generate admin SBOM (CycloneDX JSON)
        run: |
          trivy fs apps/admin \
            --format cyclonedx \
            --output sbom-admin.cdx.json \
            --scanners vuln \
            --quiet

      - name: Upload SBOMs as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-api.cdx.json
            sbom-admin.cdx.json
          retention-days: 90

      - name: Post SBOM summary
        run: |
          api_count=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('sbom-api.cdx.json'))
            print(len(d.get('components', [])))
          except Exception:
            print('?')
          ")
          admin_count=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('sbom-admin.cdx.json'))
            print(len(d.get('components', [])))
          except Exception:
            print('?')
          ")
          {
            echo "### SBOM generated — \`${{ github.sha }}\`"
            echo ""
            echo "| Surface | Format | Components | Artefact |"
            echo "|---|---|---|---|"
            echo "| API (Python) | CycloneDX JSON | $api_count | \`sbom-api.cdx.json\` |"
            echo "| Admin (Node) | CycloneDX JSON | $admin_count | \`sbom-admin.cdx.json\` |"
            echo ""
            echo "> Container-level SBOM (exact installed versions) is attached to the"
            echo "> OCI manifest by the release pipeline via \`docker buildx --sbom=true\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # License compliance: detect copyleft (GPL / AGPL) and other legally
  # problematic licenses in all production and dev dependencies.
  #
  # Trivy license severity classification used here:
  #   CRITICAL → AGPL-* (server-side copyleft — incompatible with SaaS)
  #   HIGH     → GPL-*  (copyleft — incompatible with proprietary distribution)
  #   MEDIUM   → LGPL-*, MPL-*, CDDL-* (reciprocal — review required)
  #   LOW      → MIT, Apache-2.0, BSD-*, ISC (permissive — OK)
  #
  # Gate: CRITICAL and HIGH fail the build.  MEDIUM is a warning.
  # If a dep legitimately uses GPL (e.g. a CLI tool never shipped in the
  # binary), add it to .trivyignore with a comment and expiry date.
  # ---------------------------------------------------------------------------
  license-check:
    name: License compliance — API + admin
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: License scan — API (fail on CRITICAL/HIGH)
        run: |
          trivy fs services/api \
            --scanners license \
            --license-full \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table

      - name: License scan — admin (fail on CRITICAL/HIGH)
        run: |
          trivy fs apps/admin \
            --scanners license \
            --license-full \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table

      - name: Full license report (all severities — advisory)
        # Always run; non-blocking.  Gives visibility into MEDIUM/LOW licenses.
        if: always()
        continue-on-error: true
        run: |
          {
            echo "### License compliance report"
            echo ""
            echo "#### API (Python)"
            echo '```'
            trivy fs services/api \
              --scanners license \
              --license-full \
              --format table 2>/dev/null || true
            echo '```'
            echo ""
            echo "#### Admin (Node)"
            echo '```'
            trivy fs apps/admin \
              --scanners license \
              --license-full \
              --format table 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
